name: Deploy to Manus

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - ".claude/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Manus Deployment
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            --request POST \
            --url https://api.manus.ai/v1/tasks \
            --header "API_KEY: ${{ secrets.THAILANDHAYOM }}" \
            --header "Content-Type: application/json" \
            --data '{
              "prompt": "Pull the latest code from the GitHub repository https://github.com/Mekjunkong/thailand-hayom (main branch) and redeploy the Thailand Hayom website. Run pnpm install, then pnpm build, and deploy the updated build.",
              "agentProfile": "manus-1.6"
            }')

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ge 400 ]; then
            echo "::error::Manus API returned $http_code"
            exit 1
          fi

          echo "Manus deployment task created successfully"
