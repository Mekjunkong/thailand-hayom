<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="%VITE_APP_LOGO%" />
    <link rel="apple-touch-icon" href="%VITE_APP_LOGO%" />
    <title>%VITE_APP_TITLE%</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Thailand Hayom - Weekly Hebrew newsletter with travel tips, visa updates, events, and local guides for Israeli travelers in Chiang Mai and Thailand. תאילנד היום - חדשות ומדריכים בעברית" />
    <meta name="keywords" content="Thailand, Chiang Mai, Israeli travelers, Hebrew newsletter, travel tips, visa updates, vegan restaurants, Thai events, תאילנד, צ'אנג מאי, מטיילים ישראלים, חדשות בעברית" />
    <meta name="author" content="Thailand Hayom" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Thailand Hayom - תאילנד היום | Hebrew Newsletter for Israeli Travelers" />
    <meta property="og:description" content="Weekly Hebrew newsletter with travel tips, visa updates, events, and local guides for Chiang Mai and Thailand" />
    <meta property="og:image" content="/images/hero-beach.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Thailand Hayom - תאילנד היום | Hebrew Newsletter" />
    <meta property="twitter:description" content="Weekly Hebrew newsletter for Israeli travelers in Thailand" />
    <meta property="twitter:image" content="/images/hero-beach.png" />
    <!-- Google Fonts for Multilingual Design -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&family=Kanit:wght@400;500;600;700&family=Prompt:wght@300;400;500;600&family=Sarabun:wght@300;400;500;600&family=Assistant:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
